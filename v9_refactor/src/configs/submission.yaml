# Canonical submission config.
#
# The solver loads this file by default when neither SOLVER_PROFILE nor
# SOLVER_CONFIG_PATH is set. Edit this file to choose the behavior you want to
# submit.
#
# Current default: myeongseok-replica behavior (see myeongseok_replica.yaml).
# Per-event LLM parser repair + state patches during history tracking, and an
# LLM target-verdict judge that may override the deterministic verdict when the
# deterministic result is fallback/partial/low-confidence or the final event
# looks repairable. RAG is disabled; the rag_parser_repair pipeline is off.
settings:
  USE_LLM_PARSE_FALLBACK: true
  ENABLE_RAG_REPAIR: false
  ENABLE_PARSE_AUDIT: false
  LLM_PIPELINE_MODE: off

  LLM_ALLOW_VERDICT_OVERRIDE: true
  LLM_PARSE_TRUST_IMPLEMENTED_HIGH_CONF: false

  LLM_PARSE_JUDGE_PARTIAL: true
  LLM_PARSE_JUDGE_BELOW_CONFIDENCE: 0.60

  LLM_PARSE_REPAIR_NO_FAMILY: true
  LLM_PARSE_REPAIR_NON_RW_COMMANDS: true
  LLM_PARSE_REPAIR_NO_FAMILY_PRETARGET: true
  LLM_PARSE_REPAIR_NON_RW_COMMANDS_PRETARGET: true

  LLM_PARSE_MIN_CONFIDENCE: 0.82
  LLM_PARSE_MAX_NEW_TOKENS: 384

  LLM_PARSE_ENABLE_RAG: false

  MODEL_NAME: Qwen/Qwen3.5-9B
  HF_HOME: /workspace/cache/hf_cache
  HF_HUB_OFFLINE: true
  LLM_PARSE_MAX_MODEL_LEN: 8192
  LLM_PARSE_STRUCTURED_OUTPUTS: true
